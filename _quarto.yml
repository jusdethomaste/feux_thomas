project:
  type: book

lang: fr

book:
  title: "Modélisation spatiale des feux de forêt"
  author: "Prénom Nom"
  date: today
  date-format: "D MMMM YYYY"
  repo-url: https://github.com
  repo-actions: [edit, issue]
  sharing: [twitter, linkedin]

  sidebar:
    style: docked
    background: light

  chapters:
    - index.qmd
    - part: "Cadre théorique"
      chapters:
        - 01-introduction.qmd
        - 02-methodologie.qmd
    - part: "Analyse"
      chapters:
        - 03-simulations.qmd
        - 04-resultats.qmd
    - 05-discussion.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: flatly
      dark: darkly
    code-fold: true
    code-tools: true
    toc: true
    toc-depth: 3
    number-sections: true
    fig-align: center
    fig-dpi: 150
    highlight-style: github

execute:
  eval: true
  warning: false
  message: false
  cache: false
  freeze: true